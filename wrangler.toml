# Cloudflare Workers configuration for MotoExpert AI
# Note: For full Python support, consider using Cloudflare Pages with a Python runtime
# or deploy to a platform like Railway, Render, or Fly.io

# For Cloudflare deployment, you'll need to use the Workers with Python (beta)
# or convert to a more compatible deployment target

name = "motoexpert-ai"
main = "main.py"
compatibility_date = "2024-01-01"

# For Python Workers (beta), you need to enable Python in your Cloudflare dashboard
# https://developers.cloudflare.com/workers/languages/python/

# If using Pages with Functions:
# - Put API routes in functions/api/[[route]].py
# - Put static files in public/

# Environment variables (set these in Cloudflare dashboard)
# [vars]
# GOOGLE_SHEETS_URL = "https://docs.google.com/spreadsheets/d/..."

# For production, consider:
# - Railway.app (easy FastAPI deployment)
# - Render.com (free tier available)
# - Fly.io (great for global deployment)
# - Hugging Face Spaces (free, supports FastAPI)
