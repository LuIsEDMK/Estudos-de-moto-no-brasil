<aside class="w-full lg:w-64 xl:w-72 flex-shrink-0 flex flex-col gap-4">

    <!-- VIP Login -->
    <div class="panel p-4">
        <h2 class="text-sm font-bold mb-3 flex items-center gap-2" style="color: rgb(var(--color-content-muted));">
            <svg class="w-4 h-4 text-amber-500" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path
                    d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
            </svg>
            Acesso VIP
        </h2>

        <!-- Botao de login (apenas se nao logado ainda) -->
        <div x-show="!usuarioVip && loginStatus !== 'sem_vip'" class="flex flex-col gap-2 relative">
            <!-- SUBSTITUA POR SEU CLIENT ID DO GOOGLE -->
            <div id="g_id_onload"
                data-client_id="51733536175-ilmo46tecqbffvmr578p0bua8r118nfn.apps.googleusercontent.com"
                data-context="signin" data-ux_mode="popup" data-callback="handleCredentialResponse"
                data-auto_prompt="false">
            </div>

            <div class="g_id_signin w-full" data-type="standard" data-shape="pill" data-theme="outline"
                data-text="signin_with" data-size="large" data-logo_alignment="left" data-width="100%">
            </div>

            <!-- Erro de autenticação Google -->
            <div x-show="loginStatus === 'erro'" class="mt-2 text-xs text-red-500 text-center" x-cloak>
                ❌ Erro ao verificar conta Google. Tente novamente.
            </div>
        </div>

        <!-- Mensagem: logou mas nao tem VIP -->
        <div x-show="loginStatus === 'sem_vip'" class="flex flex-col gap-3" x-cloak>
            <div class="text-xs text-center p-3 rounded-lg"
                style="background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #ef4444;">
                <div class="font-bold text-sm mb-1">❌ Acesso não liberado</div>
                <div>Seu e-mail não está cadastrado como VIP.</div>
            </div>
            <button @click="abaAtiva = 'assinar'" class="btn-primary text-center text-xs py-2 no-underline block w-full"
                style="text-decoration: none;">
                🛒 Adquira o Acesso VIP
            </button>
            <button @click="loginStatus = null" class="text-xs text-center"
                style="color: rgb(var(--color-content-muted));">
                Tentar com outra conta
            </button>
        </div>

        <!-- Sucesso VIP -->
        <div x-show="usuarioVip" class="flex flex-col gap-2 mt-1" x-cloak>
            <div class="alert alert-success text-xs py-2 mb-0">
                👑 Acesso VIP liberado com sucesso!
            </div>
            <button @click="logout"
                class="text-xs text-center py-1 mt-1 font-semibold text-rose-500 hover:text-rose-600 dark:text-rose-400 dark:hover:text-rose-300 transition-colors cursor-pointer"
                style="border: none; background: transparent; width: 100%;">
                Sair da conta
            </button>
        </div>
    </div>

    <!-- Categoria Selector -->
    <div class="panel p-4">
        <h2 class="text-sm font-bold mb-3 flex items-center gap-2" style="color: rgb(var(--color-content-muted));">
            <svg class="w-4 h-4 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path
                    d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
            </svg>
            Categoria
        </h2>
        <div class="grid grid-cols-3 gap-2">
            <button @click="mudarCategoria('MOTORCYCLE')"
                :class="tipoVeiculo === 'MOTORCYCLE' ? 'btn-category active' : 'btn-category'">
                🏍️ Motos
            </button>
            <button @click="mudarCategoria('CAR')"
                :class="tipoVeiculo === 'CAR' ? 'btn-category active' : 'btn-category'">
                🚗 Carros
            </button>
            <button @click="mudarCategoria('TRUCK')"
                :class="tipoVeiculo === 'TRUCK' ? 'btn-category active' : 'btn-category'">
                🚛 Caminhões
            </button>
        </div>
    </div>

    <!-- Search Controls -->
    <div class="panel p-4">
        <h2 class="text-sm font-bold mb-4 flex items-center gap-2" style="color: rgb(var(--color-content-muted));">
            <svg class="w-4 h-4 text-orange-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"
                aria-hidden="true">
                <circle cx="11" cy="11" r="8" />
                <path d="m21 21-4.35-4.35" />
            </svg>
            Consultar <span
                x-text="tipoVeiculo === 'MOTORCYCLE' ? 'Moto' : (tipoVeiculo === 'CAR' ? 'Carro' : 'Caminhão')"></span>
        </h2>

        <div class="flex flex-col gap-3">
            <div>
                <label class="sidebar-label" for="select-marca">Marca</label>
                <select id="select-marca" x-model="marcaSelecionada" @change="carregarModelos($event)"
                    class="form-control">
                    <option value="">Selecione a marca...</option>
                    <template x-for="marca in marcasDisponiveis" :key="marca">
                        <option :value="marca" x-text="marca"></option>
                    </template>
                </select>
            </div>

            <div>
                <label class="sidebar-label" for="select-modelo">Modelo</label>
                <select id="select-modelo" x-model="modeloSelecionado" class="form-control">
                    <option value="">Selecione o modelo...</option>
                    <template x-for="modelo in modelosDisponiveis" :key="modelo">
                        <option :value="modelo" x-text="modelo"></option>
                    </template>
                </select>
            </div>

            <button id="btn-analisar" @click="analisar" class="btn-primary mt-1">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"
                    aria-hidden="true">
                    <path
                        d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                </svg>
                Analisar Desvalorização
            </button>
        </div>

        <div x-show="!usuarioVip" class="mt-4 pt-4 text-xs"
            style="border-top: 1px solid rgb(var(--color-border)); color: rgb(var(--color-content-muted));">
            <span class="font-mono font-semibold" style="color: rgb(var(--color-content));" x-text="restantes"></span>
            consultas gratuitas restantes
        </div>
    </div>

</aside>
